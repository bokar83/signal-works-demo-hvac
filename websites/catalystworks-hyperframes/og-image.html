<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #071A2E;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      overflow: hidden;
      position: relative;
    }
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0,183,194,0.12) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      pointer-events: none;
    }
    .glow2 {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,122,0,0.07) 0%, transparent 70%);
      bottom: -100px;
      left: 200px;
      pointer-events: none;
    }
    .content {
      padding: 64px 80px;
      flex: 1;
      position: relative;
      z-index: 1;
    }
    .eyebrow {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #00B7C2;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .eyebrow::before {
      content: '';
      display: block;
      width: 22px;
      height: 2px;
      background: #00B7C2;
    }
    h1 {
      font-size: 58px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 28px;
    }
    h1 em {
      font-style: normal;
      color: #00B7C2;
    }
    .sub {
      font-size: 18px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      margin-bottom: 40px;
      max-width: 520px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(0,183,194,0.1);
      border: 1px solid rgba(0,183,194,0.25);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 700;
      color: #00B7C2;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #FF7A00;
      flex-shrink: 0;
    }
    .logo {
      position: absolute;
      bottom: 64px;
      left: 80px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.4);
    }
    .logo span { color: #00B7C2; }
    .photo-col {
      width: 360px;
      flex-shrink: 0;
      height: 630px;
      position: relative;
      overflow: hidden;
    }
    .photo-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0.85;
    }
    .photo-col::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, #071A2E 0%, transparent 40%);
      z-index: 1;
    }
    .price-tag {
      position: absolute;
      bottom: 64px;
      right: 80px;
      text-align: right;
    }
    .price-tag .amount {
      font-size: 42px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
    }
    .price-tag .label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="glow2"></div>
  <div class="content">
    <div class="eyebrow">Catalyst Works</div>
    <h1>You know something<br>is wrong. You just<br>can't <em>name it</em>.</h1>
    <p class="sub">60 minutes. One constraint named in writing. $350 Executive Signal Session for CEOs, COOs &amp; CIOs.</p>
    <div class="pill">
      <div class="dot"></div>
      catalystworks.consulting
    </div>
    <div class="logo">Catalyst<span>Works</span></div>
  </div>
  <div class="photo-col">
    <img src="Boubacar.JPG" alt="Boubacar Barry">
  </div>
</body>
</html>
