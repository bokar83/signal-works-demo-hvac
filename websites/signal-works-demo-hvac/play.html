<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Works -- HVAC AI Presence Demo</title>
<meta name="robots" content="noindex">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }
  #spinner {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.4s;
  }
  #spinner svg { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="spinner">
  <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
    <circle cx="20" cy="20" r="16" stroke="#333" stroke-width="4"/>
    <path d="M20 4a16 16 0 0 1 16 16" stroke="#E8A020" stroke-width="4" stroke-linecap="round"/>
  </svg>
</div>
<video id="v" src="pitch-reel.mp4" autoplay muted playsinline loop
       preload="auto" poster="pitch-reel-thumbnail.png"></video>
<script>
  var v = document.getElementById('v');
  var s = document.getElementById('spinner');
  function hide() { s.style.opacity = '0'; setTimeout(function(){ s.style.display='none'; }, 400); }
  v.addEventListener('canplay', hide);
  v.addEventListener('playing', hide);
  setTimeout(hide, 3000);
  v.addEventListener('click', function() { v.muted = !v.muted; });
</script>
</body>
</html>
